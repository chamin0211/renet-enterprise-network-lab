name: renet_routing_basic

topology:
  nodes:
    dev-host:
      kind: linux
      image: nicolaka/netshoot:latest
      cmd: sleep infinity
      exec:
        - ip link set eth1 up
        - ip addr add 10.10.10.10/24 dev eth1
        - bash -lc 'ip route del default || true'
        - ip route add default via 10.10.10.1

    core-r1:
      kind: linux
      image: nicolaka/netshoot:latest
      cmd: sleep infinity
      sysctls:
        net.ipv4.ip_forward: 1
      exec:
        - ip link set eth1 up
        - ip link set eth2 up
        - ip addr add 10.10.10.1/24 dev eth1
        - ip addr add 10.10.40.1/24 dev eth2
        - sysctl -w net.ipv4.ip_forward=1

    server-host:
      kind: linux
      image: nicolaka/netshoot:latest
      cmd: sleep infinity
      exec:
        - ip link set eth1 up
        - ip addr add 10.10.40.10/24 dev eth1
        - bash -lc 'ip route del default || true'
        - ip route add default via 10.10.40.1

  links:
    - endpoints: ["dev-host:eth1", "core-r1:eth1"]
    - endpoints: ["core-r1:eth2", "server-host:eth1"]
